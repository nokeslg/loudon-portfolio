<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference Audio — Loudon Nokes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Archivo:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --red: #F7014C;
  --black: #1C1D1D;
  --white: #FFFFFF;
  --off-white: #F2F0ED;
}

html { font-size: 16px; }

body {
  background: var(--black);
  color: var(--off-white);
  font-family: 'Archivo', sans-serif;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ── NAV ──────────────────────────────────────────── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  height: 60px;
  background: rgba(28,29,29,0.6);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(247,1,76,0.12);
}

.nav-logo {
  display: flex;
  align-items: center;
  text-decoration: none;
  flex-shrink: 0;
}
.nav-logo svg { height: 26px; width: auto; display: block; }

.nav-back {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 0.63rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  text-decoration: none;
  transition: color 0.15s;
}
.nav-back:hover { color: var(--red); }
.nav-back-arrow { transition: transform 0.15s; }
.nav-back:hover .nav-back-arrow { transform: translateX(-3px); }

/* ── PROJECT HEADER ───────────────────────────────── */
.project-header {
  padding: 140px 80px 60px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid rgba(247,1,76,0.1);
}

.project-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(48px, 7vw, 96px);
  letter-spacing: -0.01em;
  line-height: 0.92;
  color: var(--off-white);
}

.project-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  padding-bottom: 6px;
}

.project-tags {
  display: flex;
  gap: 8px;
}

.project-tag {
  font-family: 'Syne', sans-serif;
  font-size: 0.58rem;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(247,1,76,0.7);
  border: 1px solid rgba(247,1,76,0.25);
  padding: 6px 14px;
}

.project-year {
  font-family: 'Archivo', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* ── CASE STUDY IMAGE ─────────────────────────────── */
.case-study {
  padding: 64px 300px 80px;
}

.case-study img {
  display: block;
  width: 100%;
  height: auto;
}

/* ── VIDEOS ───────────────────────────────────────── */
.videos-section {
  padding: 0 300px 100px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.video-block {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.video-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.6rem;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}

.video-block video {
  display: block;
  width: 100%;
  height: auto;
  background: #111;
}

/* ── FOOTER ────────────────────────────────────────── */
footer {
  padding: 28px 80px;
  border-top: 1px solid rgba(247,1,76,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

footer a {
  font-family: 'Archivo', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.26);
  text-decoration: none;
  transition: color 0.15s;
}
footer a:hover { color: var(--red); }

.footer-logo-mark {
  display: flex;
  align-items: center;
  opacity: 0.7;
  transition: opacity 0.15s;
}
.footer-logo-mark:hover { opacity: 1; }

.footer-copy {
  font-family: 'Archivo', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.14);
}
</style>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────── -->
<nav>
  <a href="index.html" class="nav-logo">
    <svg width="133" height="216" viewBox="0 0 133 216" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 27.4277V121.629H45.9307V85.2197H132.139V215.439L92.1377 188.011V93.8105H85.9307V130.22H0V0L40 27.4277Z" fill="#F7014C"/>
    </svg>
  </a>
  <a href="index.html" class="nav-back">
    <span class="nav-back-arrow">←</span> All Work
  </a>
</nav>

<!-- ── PROJECT HEADER ──────────────────────────────── -->
<header class="project-header">
  <h1 class="project-title">Reference Audio</h1>
  <div class="project-meta">
    <div class="project-tags">
      <span class="project-tag">Branding</span>
      <span class="project-tag">UI/UX</span>
    </div>
    <span class="project-year">2025</span>
  </div>
</header>

<!-- ── CASE STUDY ──────────────────────────────────── -->
<main class="case-study">
  <img src="reference-audio.png" alt="Reference Audio — Case Study">
</main>

<!-- ── VIDEOS ─────────────────────────────────────── -->
<section class="videos-section">
  <div class="video-block">
    <span class="video-label">Commercial</span>
    <video controls>
      <source src="ra-commercial.mp4" type="video/mp4">
    </video>
  </div>
  <div class="video-block">
    <span class="video-label">Website</span>
    <video controls>
      <source src="ra-video1.mp4" type="video/mp4">
    </video>
  </div>
  <div class="video-block">
    <span class="video-label">Companion App</span>
    <video id="companion-video" controls>
      <source src="ra-video2.mp4" type="video/mp4">
    </video>
  </div>
</section>

<!-- ── FOOTER ────────────────────────────────────────── -->
<footer>
  <a href="mailto:loudonnokes@gmail.com">loudonnokes@gmail.com</a>
  <a href="index.html" class="footer-logo-mark" aria-label="Loudon Nokes">
    <svg height="28" width="auto" viewBox="0 0 133 216" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 27.4277V121.629H45.9307V85.2197H132.139V215.439L92.1377 188.011V93.8105H85.9307V130.22H0V0L40 27.4277Z" fill="#F7014C"/>
    </svg>
  </a>
  <span class="footer-copy">©2025 Loudon Nokes</span>
</footer>

<script>
  const companion = document.getElementById('companion-video');
  companion.volume = 0.1;
  companion.addEventListener('loadedmetadata', () => { companion.currentTime = 2; });
  companion.addEventListener('timeupdate', () => { if (companion.currentTime < 2) companion.currentTime = 2; });
</script>
</body>
</html>
